name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NVIDIA_API_KEY: dummy-ci-key
      NVIDIA_BASE_URL: https://integrate.api.nvidia.com/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate NAT workflow
        run: nat validate --config_file config.yml

      - name: Run tests
        run: python -m pytest

      - name: Lint Python
        run: python -m ruff check .

      - name: Validate shell scripts
        run: bash -n scripts/*.sh

      - name: Repository hygiene
        run: |
          test -z "$(git ls-files '.env' '.venv/*' 'external/*' '.idea/*')"
          git check-ignore .env
          git check-ignore external/nat-ui

